# ==========================================
#  TMUX CONFIGURATION (Server/LXC Optimized)
# ==========================================

# --- GLOBAL SETTINGS ---
# Move status line to the top
set -g status-position top
set -g status on

# Set 256 colors compatibility
set -g default-terminal "screen-256color"

# Increase scrollback buffer size
set -g history-limit 50000

# Useful for multi-monitor setups with grouped sessions
setw -g aggressive-resize on

# Enable mouse support (helpful for scrolling through logs over SSH)
set -g mouse on

# Start window and pane numbering at 1 (more ergonomic)
set -g base-index 1
setw -g pane-base-index 1

# --- KEYBINDINGS ---
# Remap prefix to Ctrl+y (User preference)
set -g prefix C-y
unbind C-b
bind C-y send-prefix

# Reload config file with Prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Buffer management
bind Space choose-buffer

# --- PLUGINS (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Redwine theme using tmux-power
set -g @plugin 'wfxr/tmux-power'
set -g @tmux_power_theme 'redwine'

# --- AUTO-INSTALL TPM ---
# Automatically clone TPM and install plugins if not present
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (Must remain at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
