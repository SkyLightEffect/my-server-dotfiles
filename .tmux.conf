# ==========================================
#  TMUX CONFIGURATION (grafik_8.png Style)
#  Theme: Dracula-Vibe (Magenta Block)
# ==========================================

# --- GLOBAL SETTINGS ---
set -g status-position top
set -g status on
set -g default-terminal "screen-256color"
set -g history-limit 50000
setw -g aggressive-resize on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# --- KEYBINDINGS ---
# Set Prefix to Ctrl+y
set -g prefix C-y
unbind C-b
bind C-y send-prefix

# Easy Reload
unbind r
bind r source-file ~/.tmux.conf \; display "Dracula-Vibe Reloaded!"

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'jimeh/tmux-themepack'

# --- THEME SELECTION ---
# 'powerline/block/magenta' gives you that deep Dracula purple.
# Alternative: 'powerline/block/cyan'
 # set -g @themepack 'powerline/basic'
set -g @themepack 'basic'

# --- AUTO-INSTALL TPM ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM (Keep this at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
