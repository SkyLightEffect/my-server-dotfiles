# ==========================================
#  TMUX CONFIGURATION (Dracula Edition)
# ==========================================

# --- GLOBAL SETTINGS ---
set -g status-position top
set -g status on
set -g default-terminal "screen-256color"
set -g history-limit 50000
setw -g aggressive-resize on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1

# --- KEYBINDINGS ---
set -g prefix C-y
unbind C-b
bind C-y send-prefix
unbind r
bind r source-file ~/.tmux.conf \; display "Dracula Config Reloaded!"
bind Space choose-buffer

# --- PLUGINS (via TPM) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Official Dracula Theme
set -g @plugin 'dracula/tmux'

# --- DRACULA THEME CUSTOMIZATION ---
# Disable high-resource plugins for LXC
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session
set -g @dracula-cpu-usage-label "CPU"
set -g @dracula-ram-usage-label "RAM"
set -g @dracula-show-timezone false
set -g @dracula-day-month true
set -g @dracula-military-time true

# NOTE: If you DON'T install a Nerd Font on Windows, 
# set the following line to 'false' to avoid broken symbols:
set -g @dracula-show-left-sep °
set -g @dracula-show-right-sep ˛

# --- AUTO-INSTALL TPM ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
